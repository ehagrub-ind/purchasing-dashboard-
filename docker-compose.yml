services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: purchasing
      POSTGRES_USER: purchasing
      POSTGRES_PASSWORD: purchasing123
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purchasing -d purchasing"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend-fastapi
    ports:
      - "4100:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://purchasing:purchasing123@db:5432/purchasing"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend-fastapi/app:/app/app
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend-next
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  pgdata:
